spring.application.name=history-viewer
server.port=8081

# Load API key from root .env (when run from app directory, ../ = project root)
# Also checks the current directory so Docker / K8s mounts work without path gymnastics
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

upstream.base-url=https://add.piotrkojalowicz.dev
upstream.api-key=${ADD_API_KEY}

# Tickers polled every 10 s in the background
history.tracked-tickers=ACME,ALFA,BETA,CASH,CLOUD,DATA,DEVS,ECO,HEAL,NET,NOVA,FUEL,GAME,GRIN,INSR,JET

# Actuator — expose health for K8s probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
