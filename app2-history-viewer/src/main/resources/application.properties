spring.application.name=history-viewer
server.port=8081

upstream.base-url=https://add.piotrkojalowicz.dev
upstream.api-key=${ADD_API_KEY}

# Tickers polled every 10 s in the background
history.tracked-tickers=ACME,ALFA,BETA,CASH,CLOUD,DATA,DEVS,ECO,HEAL,NET,NOVA,FUEL,GAME,HEAL,INSR,JET

# Actuator — expose health for K8s probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
