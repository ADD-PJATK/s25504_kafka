stages:
  - build
  - docker
  - deploy

variables:
  REGISTRY: registry.gitlab.com/$CI_PROJECT_PATH
  JAVA_VERSION: "21"

# ── Build & Test ──────────────────────────────────────────────────────────────

.maven-build: &maven-build
  image: maven:3.9-eclipse-temurin-21
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository
  before_script:
    - export MAVEN_OPTS="-Dmaven.repo.local=.m2/repository"

build-app1:
  <<: *maven-build
  stage: build
  script:
    - cd app1-realtime-dashboard
    - mvn verify --no-transfer-progress
  artifacts:
    paths:
      - app1-realtime-dashboard/target/*.jar
    expire_in: 1 hour

build-app2:
  <<: *maven-build
  stage: build
  script:
    - cd app2-history-viewer
    - mvn verify --no-transfer-progress
  artifacts:
    paths:
      - app2-history-viewer/target/*.jar
    expire_in: 1 hour

# ── Docker Build & Push ───────────────────────────────────────────────────────

.docker-build: &docker-build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG'

docker-app1:
  <<: *docker-build
  stage: docker
  needs: [build-app1]
  script:
    - docker build -t $REGISTRY/app1-realtime-dashboard:$CI_COMMIT_SHORT_SHA app1-realtime-dashboard/
    - docker push $REGISTRY/app1-realtime-dashboard:$CI_COMMIT_SHORT_SHA
    - docker tag $REGISTRY/app1-realtime-dashboard:$CI_COMMIT_SHORT_SHA $REGISTRY/app1-realtime-dashboard:latest
    - docker push $REGISTRY/app1-realtime-dashboard:latest

docker-app2:
  <<: *docker-build
  stage: docker
  needs: [build-app2]
  script:
    - docker build -t $REGISTRY/app2-history-viewer:$CI_COMMIT_SHORT_SHA app2-history-viewer/
    - docker push $REGISTRY/app2-history-viewer:$CI_COMMIT_SHORT_SHA
    - docker tag $REGISTRY/app2-history-viewer:$CI_COMMIT_SHORT_SHA $REGISTRY/app2-history-viewer:latest
    - docker push $REGISTRY/app2-history-viewer:latest

# ── GitOps Deploy ─────────────────────────────────────────────────────────────

deploy:
  image: bitnami/kubectl:1.29
  stage: deploy
  needs: [docker-app1, docker-app2]
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - kubectl apply -f k8s/
    - kubectl set image deployment/app1-realtime-dashboard
        app1=$REGISTRY/app1-realtime-dashboard:$CI_COMMIT_SHORT_SHA
    - kubectl set image deployment/app2-history-viewer
        app2=$REGISTRY/app2-history-viewer:$CI_COMMIT_SHORT_SHA
    - kubectl rollout status deployment/app1-realtime-dashboard --timeout=120s
    - kubectl rollout status deployment/app2-history-viewer --timeout=120s
