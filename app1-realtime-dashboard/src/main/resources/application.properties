spring.application.name=realtime-dashboard
server.port=8080

# Load API key from root .env (when run from app directory, ../ = project root)
# Also checks the current directory so Docker / K8s mounts work without path gymnastics
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

upstream.base-url=https://add.piotrkojalowicz.dev
upstream.api-key=${ADD_API_KEY}

# Increase response buffer for SSE proxy
spring.codec.max-in-memory-size=2MB

# Actuator — expose health for K8s probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
