<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Realtime Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg-base:    #0d1117;
            --bg-surface: #161b22;
            --bg-raised:  #21262d;
            --border:     #30363d;
            --text-main:  #e6edf3;
            --text-muted: #8b949e;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg-base); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0; height: 100vh; overflow: hidden;
        }
        .layout { display: flex; height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px; min-width: 260px;
            background: var(--bg-surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 1rem; overflow: hidden;
        }
        .sidebar-title {
            font-size: .95rem; font-weight: 700; color: var(--text-main);
            display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem;
        }
        .status-pill {
            display: flex; align-items: center; gap: .4rem;
            font-size: .75rem; color: var(--text-muted); margin-bottom: .6rem;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #f85149; flex-shrink:0; }
        .dot.on { background: #3fb950; }
        #search {
            background: var(--bg-base); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 6px;
            padding: .3rem .55rem; font-size: .8rem; width: 100%;
            margin-bottom: .4rem; outline: none;
        }
        #search:focus { border-color: #58a6ff; }
        .ticker-scroll { flex: 1; overflow-y: auto; margin-bottom: .6rem; }
        .ticker-scroll::-webkit-scrollbar { width: 4px; }
        .ticker-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .ticker-row {
            display: flex; align-items: center; gap: .45rem;
            padding: .22rem .35rem; border-radius: 5px; cursor: pointer; user-select: none;
        }
        .ticker-row:hover { background: var(--bg-raised); }
        .ticker-row input[type=checkbox] { accent-color: #58a6ff; width: 14px; height: 14px; cursor:pointer; flex-shrink:0; }
        .ticker-row label { cursor: pointer; font-size: .8rem; margin: 0; line-height: 1.3; }
        .ticker-sym { font-weight: 700; color: var(--text-main); }
        .ticker-co  { font-size: .68rem; color: var(--text-muted); margin-left: .2rem; }

        .btn-connect {
            width: 100%; padding: .4rem; border-radius: 6px; border: none;
            font-size: .83rem; font-weight: 600; cursor: pointer; margin-bottom: .35rem;
            background: #238636; color: #fff; transition: background .15s;
        }
        .btn-connect:hover:not(:disabled) { background: #2ea043; }
        .btn-connect:disabled { opacity: .45; cursor: not-allowed; }
        .btn-disconnect {
            width: 100%; padding: .4rem; border-radius: 6px;
            border: 1px solid #f85149; background: transparent;
            color: #f85149; font-size: .83rem; font-weight: 600; cursor: pointer;
        }
        .btn-disconnect:hover:not(:disabled) { background: rgba(248,81,73,.12); }
        .btn-disconnect:disabled { opacity: .35; cursor: not-allowed; }
        .last-update { font-size: .7rem; color: var(--text-muted); margin-top: .45rem; }

        /* ── Main ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: .85rem; gap: .7rem; }
        .card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
        }
        .card-head {
            background: var(--bg-raised); border-bottom: 1px solid var(--border);
            padding: .45rem .8rem; font-size: .8rem; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-muted);
        }
        .card-head strong { color: var(--text-main); }
        .card-body { padding: .7rem; }
        .chart-wrap { height: 290px; position: relative; }
        .chart-wrap canvas { height: 100% !important; }
        .btn-xs {
            font-size: .7rem; padding: .18rem .5rem; border-radius: 4px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-muted); cursor: pointer;
        }
        .btn-xs:hover { color: var(--text-main); border-color: var(--text-muted); }

        /* ── Table ── */
        .table-wrap { flex: 1; overflow-y: auto; min-height: 0; }
        .table-wrap::-webkit-scrollbar { width: 4px; }
        .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        table { width: 100%; border-collapse: collapse; font-size: .82rem; }
        thead th {
            position: sticky; top: 0; z-index: 1;
            background: var(--bg-raised); color: var(--text-muted);
            padding: .45rem .7rem; text-align: left; font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        tbody tr { border-bottom: 1px solid var(--border); }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--bg-raised); }
        tbody td { padding: .4rem .7rem; color: #e6edf3 !important; }
        .price-up   { color: #3fb950; }
        .price-down { color: #f85149; }
        .price-flat { color: var(--text-muted); }
        .empty-msg  { text-align: center; color: var(--text-muted); padding: 2rem !important; }

        /* Active tickers badge row */
        .active-chips { display: flex; flex-wrap: wrap; gap: .25rem; }
        .chip {
            font-size: .68rem; padding: .1rem .4rem; border-radius: 99px;
            border: 1px solid; font-weight: 600;
        }

        /* Time range segmented control */
        .range-group { display: flex; gap: 2px; }
        .range-btn {
            font-size: .72rem; padding: .18rem .55rem; border-radius: 4px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-muted); cursor: pointer; transition: all .12s;
        }
        .range-btn:hover { color: var(--text-main); border-color: var(--text-muted); }
        .range-btn.active {
            background: #1f6feb; border-color: #58a6ff; color: #fff; font-weight: 600;
        }
    </style>
</head>
<body>
<div class="layout">

    <!-- ── Sidebar ── -->
    <div class="sidebar">
        <div class="sidebar-title">
            <svg width="17" height="17" fill="#3fb950" viewBox="0 0 16 16">
                <path d="M0 0h1v15h15v1H0V0zm10 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V4.9l-3.613 4.417a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61L13.445 4H10.5a.5.5 0 0 1-.5-.5z"/>
            </svg>
            Realtime Dashboard
        </div>

        <div class="status-pill">
            <span class="dot" id="dot"></span>
            <span id="status-text">Disconnected</span>
        </div>

        <input type="text" id="search" placeholder="Search tickers…">

        <div class="ticker-scroll" id="ticker-list">
            <div style="color:var(--text-muted);font-size:.78rem;padding:.4rem">Loading…</div>
        </div>

        <button class="btn-connect"    id="btn-connect">Connect</button>
        <button class="btn-disconnect" id="btn-disconnect" disabled>Disconnect</button>
        <div class="last-update">Last tick: <span id="last-update">—</span></div>
    </div>

    <!-- ── Main ── -->
    <div class="main">

        <!-- Chart card -->
        <div class="card">
            <div class="card-head">
                <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap">
                    <strong>Price Chart</strong>
                    <span class="active-chips" id="active-chips" style="display:inline-flex"></span>
                </div>
                <div style="display:flex;align-items:center;gap:.5rem">
                    <div class="range-group" id="range-group">
                        <button class="range-btn" data-minutes="1">1m</button>
                        <button class="range-btn" data-minutes="5">5m</button>
                        <button class="range-btn" data-minutes="10">10m</button>
                        <button class="range-btn active" data-minutes="0">All</button>
                    </div>
                    <button class="btn-xs" id="btn-clear">Clear</button>
                </div>
            </div>
            <div class="card-body">
                <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
            </div>
        </div>

        <!-- Table card -->
        <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
            <div class="card-head"><strong>Live Prices</strong></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Ticker</th><th>Price (PLN)</th><th>Change</th>
                            <th>Volume</th><th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td class="empty-msg" colspan="5">Select tickers and click Connect</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Chart.js + date adapter for chronological time axis -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
// ── Palette — 10 distinguishable colours on dark bg ───────────────────────
const PALETTE = [
    '#58a6ff','#3fb950','#f78166','#d2a8ff','#ffa657',
    '#79c0ff','#56d364','#ff7b72','#e3b341','#76e3ea'
];
const tickerColor = {};
let colorIdx = 0;
function colorFor(sym) {
    if (!tickerColor[sym]) tickerColor[sym] = PALETTE[colorIdx++ % PALETTE.length];
    return tickerColor[sym];
}

// ── Time range ────────────────────────────────────────────────────────────
// 0 = All (no min bound). Positive = minutes to show.
let rangeMinutes = 0;
// Keep up to 15 minutes of raw data per ticker so switching range is instant
const MAX_BUFFER_MS = 15 * 60 * 1000;

document.getElementById('range-group').addEventListener('click', e => {
    const btn = e.target.closest('.range-btn');
    if (!btn) return;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rangeMinutes = parseInt(btn.dataset.minutes);
    applyRange();
});

function applyRange() {
    if (rangeMinutes === 0) {
        chart.options.scales.x.min = undefined;
        chart.options.scales.x.max = undefined;
    } else {
        const now = Date.now();
        chart.options.scales.x.min = new Date(now - rangeMinutes * 60_000);
        chart.options.scales.x.max = new Date(now);
    }
    chart.update('none');
}

// ── Chart (time axis — always chronological) ──────────────────────────────
const chart = new Chart(document.getElementById('priceChart').getContext('2d'), {
    type: 'line',
    data: { datasets: [] },
    options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
            legend: { labels: { color: '#8b949e', boxWidth: 12, font: { size: 11 } } }
        },
        scales: {
            x: {
                type: 'time',
                time: { unit: 'second', displayFormats: { second: 'HH:mm:ss' } },
                ticks: { color: '#8b949e', maxTicksLimit: 8, maxRotation: 0 },
                grid: { color: '#21262d' }
            },
            y: {
                ticks: { color: '#8b949e' },
                grid: { color: '#21262d' }
            }
        }
    }
});

function pushToChart(sym, ts, price) {
    let ds = chart.data.datasets.find(d => d.label === sym);
    if (!ds) {
        ds = {
            label: sym, data: [],
            borderColor: colorFor(sym), backgroundColor: 'transparent',
            tension: 0.3, pointRadius: 2, borderWidth: 1.5
        };
        chart.data.datasets.push(ds);
    }
    const point = { x: new Date(ts), y: parseFloat(price) };
    ds.data.push(point);
    // Trim buffer to MAX_BUFFER_MS so memory stays bounded
    const cutoff = Date.now() - MAX_BUFFER_MS;
    while (ds.data.length > 1 && ds.data[0].x.getTime() < cutoff) ds.data.shift();

    // Keep x-axis window in sync when a range is active
    applyRange();
}

function clearChart() {
    chart.data.datasets = [];
    chart.update();
}

document.getElementById('btn-clear').onclick = clearChart;

// ── Table ─────────────────────────────────────────────────────────────────
const prevPrice = {};

function resetTable() {
    document.getElementById('tbody').innerHTML =
        '<tr><td class="empty-msg" colspan="5">Waiting for first tick…</td></tr>';
}

function upsertRow(tick) {
    const sym   = tick.ticker;
    const price = parseFloat(tick.price);
    const prev  = prevPrice[sym];
    prevPrice[sym] = price;

    const diff = prev !== undefined ? price - prev : null;
    let changeHtml;
    if (diff === null)         changeHtml = '<span class="price-flat">—</span>';
    else if (diff >  0.0001)  changeHtml = `<span class="price-up">▲ ${diff.toFixed(2)}</span>`;
    else if (diff < -0.0001)  changeHtml = `<span class="price-down">▼ ${Math.abs(diff).toFixed(2)}</span>`;
    else                       changeHtml = `<span class="price-flat">— 0.00</span>`;

    const tbody = document.getElementById('tbody');
    const emp = tbody.querySelector('.empty-msg');
    if (emp) emp.parentElement.remove();

    let row = document.getElementById('row-' + sym);
    if (!row) {
        row = document.createElement('tr');
        row.id = 'row-' + sym;
        tbody.appendChild(row);
    }
    row.innerHTML = `
        <td><strong style="color:${colorFor(sym)}">${sym}</strong></td>
        <td style="color:#e6edf3;font-weight:600">${price.toFixed(2)}</td>
        <td>${changeHtml}</td>
        <td style="color:#e6edf3">${tick.volume ?? '—'}</td>
        <td style="color:var(--text-muted);font-size:.76rem">${tick.ts ? tick.ts.substring(11,19) : '—'}</td>
    `;
}

// ── Active chips (shows which tickers the current stream is for) ──────────
function setChips(tickers) {
    const el = document.getElementById('active-chips');
    el.innerHTML = tickers.map(t =>
        `<span class="chip" style="color:${colorFor(t)};border-color:${colorFor(t)}">${t}</span>`
    ).join('');
}

// ── Ticker list ────────────────────────────────────────────────────────────
let allTickerObjs = [];

async function loadTickers() {
    try {
        const json = await fetch('/dashboard/tickers').then(r => r.json());
        const raw  = json.tickers || json || [];

        // Upstream may return strings OR objects {ticker, company}
        allTickerObjs = raw.map(t =>
            typeof t === 'string'
                ? { sym: t, company: '' }
                : { sym: t.ticker || t.symbol || String(t), company: t.company || t.name || '' }
        );
        renderList(allTickerObjs);
    } catch {
        document.getElementById('ticker-list').innerHTML =
            '<div style="color:#f85149;font-size:.78rem">Failed to load tickers</div>';
    }
}

function renderList(items) {
    document.getElementById('ticker-list').innerHTML = items.map(({ sym, company }) => `
        <div class="ticker-row" onclick="toggleCb('${sym}')">
            <input class="ticker-cb" type="checkbox" id="cb-${sym}" value="${sym}"
                   onclick="event.stopPropagation()">
            <label for="cb-${sym}">
                <span class="ticker-sym">${sym}</span>
                ${company ? `<span class="ticker-co">${company}</span>` : ''}
            </label>
        </div>`
    ).join('');
}

function toggleCb(sym) {
    const cb = document.getElementById('cb-' + sym);
    if (cb) cb.checked = !cb.checked;
}

document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    renderList(allTickerObjs.filter(({ sym, company }) =>
        sym.toLowerCase().includes(q) || company.toLowerCase().includes(q)));
});

function getSelected() {
    return [...document.querySelectorAll('.ticker-cb:checked')].map(cb => cb.value);
}

// ── SSE connection ────────────────────────────────────────────────────────
let es = null;

function setConnected(on) {
    document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
    document.getElementById('status-text').textContent = on ? 'Connected' : 'Disconnected';
    document.getElementById('btn-connect').disabled    = on;
    document.getElementById('btn-disconnect').disabled = !on;
}

document.getElementById('btn-connect').onclick = () => {
    const tickers = getSelected();
    if (!tickers.length) { alert('Select at least one ticker.'); return; }

    // Close previous stream and wipe stale data before starting fresh
    if (es) es.close();
    clearChart();
    resetTable();
    Object.keys(prevPrice).forEach(k => delete prevPrice[k]);
    setChips(tickers);

    const qs = tickers.map(t => 'tickers=' + encodeURIComponent(t)).join('&');
    es = new EventSource('/dashboard/stream?' + qs);

    es.addEventListener('tick', ev => {
        try {
            const tick = JSON.parse(ev.data);
            upsertRow(tick);
            pushToChart(tick.ticker, tick.ts, tick.price);
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        } catch (_) {}
    });
    es.onopen  = () => setConnected(true);
    es.onerror = () => setConnected(false);
};

document.getElementById('btn-disconnect').onclick = () => {
    if (es) { es.close(); es = null; }
    setConnected(false);
    document.getElementById('active-chips').innerHTML = '';
};

// ── Init ──────────────────────────────────────────────────────────────────
loadTickers();
</script>
</body>
</html>
